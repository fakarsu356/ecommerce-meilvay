<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ürün Detay - Trendyoliki</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; }
        
        nav { background: #FF6000; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
        nav h1 { color: white; font-size: 24px; cursor:pointer;}
        nav a { color: white; text-decoration: none; font-weight:bold;}
        
        .container { max-width: 900px; margin: 30px auto; padding: 0 20px; }
        
        .product-detail { background: white; border-radius: 12px; padding: 30px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        
        .product-image img { width: 100%; border-radius: 8px; object-fit: cover; max-height: 350px; }
        .no-image { width: 100%; height: 350px; background: #eee; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #aaa; font-size: 18px; }
        
        .product-info h2 { font-size: 24px; color: #333; margin-bottom: 15px; }
        .product-info .price { font-size: 32px; color: #FF6000; font-weight: bold; margin-bottom: 15px; }
        .product-info .category { background: #f0f0f0; display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 13px; color: #555; margin-bottom: 15px; }
        .product-info .stock { color: #4CAF50; font-weight: bold; margin-bottom: 25px; }
        .product-info .stock.out { color: red; }
        
        .btn-cart { width: 100%; padding: 14px; background: #FF6000; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .btn-cart:hover { background: #e55500; }
        .btn-cart:disabled { background: #ccc; cursor: not-allowed; }
        
        .back { margin-bottom: 20px; }
        .back a { color: #FF6000; text-decoration: none; font-weight: bold; }
        
        .success-msg { color: green; text-align: center; margin-top: 15px; display: none; font-weight: bold; }
        .error-msg { color: red; text-align: center; margin-top: 15px; display: none; }
    </style>
</head>
<body>

    <nav>
        <h1 onclick="window.location.href='index.html'">🛍️ Trendyoliki</h1>
        <a href="index.html">Ana Sayfa</a>
    </nav>

    <div class="container">
        <div class="back">
            <a href="index.html">← Ürünlere Geri Dön</a>
        </div>

        <div class="product-detail">
            <div class="product-image" id="product-image"></div>
            <div class="product-info" id="product-info"></div>
        </div>

        <p class="success-msg" id="success-msg">✅ Ürün sepete eklendi!</p>
        <p class="error-msg" id="error-msg">❌ Sepete eklenemedi!</p>
    </div>

    <script>
        const product = JSON.parse(localStorage.getItem("selectedProduct"));

        if (!product) {
            window.location.href = "index.html";
        }

        const imageDiv = document.getElementById("product-image");
        // DÜZELTME: imageUrl kontrolü eklendi
        const imgLink = product.imageUrl || product.image_url;

        if (imgLink) {
            imageDiv.innerHTML = `<img src="${imgLink}" alt="${product.name}">`;
        } else {
            imageDiv.innerHTML = `<div class="no-image">Resim Yok</div>`;
        }

        const inStock = product.stock > 0;
        document.getElementById("product-info").innerHTML = `
            <h2>${product.name}</h2>
            <div class="price">${product.price.toLocaleString('tr-TR')} ₺</div>
            <div class="category">📦 ${product.category ? product.category.name : 'Kategori Yok'}</div>
            <div class="stock ${inStock ? '' : 'out'}">
                ${inStock ? `✅ Stokta var (${product.stock} adet)` : '❌ Stok tükendi'}
            </div>
            <button class="btn-cart" onclick="addToCart()" ${inStock ? '' : 'disabled'}>
                🛒 Sepete Ekle
            </button>
        `;

        async function addToCart() {
            const auth = localStorage.getItem("auth");

            if (!auth) {
                document.getElementById("error-msg").style.display = "block";
                document.getElementById("error-msg").textContent = "❌ Lütfen önce giriş yapın!";
                setTimeout(() => window.location.href = "login.html", 1500);
                return;
            }

            try {
                const response = await fetch("http://localhost:8080/api/cartItems", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Basic ${auth}`
                    },
                    body: JSON.stringify({
                        product: { id: product.id },
                        quantity: 1
                    })
                });

                if (response.ok) {
                    document.getElementById("success-msg").style.display = "block";
                    document.getElementById("error-msg").style.display = "none";
                } else {
                    document.getElementById("error-msg").style.display = "block";
                    document.getElementById("error-msg").textContent = "❌ Sepete eklenemedi! (Sunucu Hatası)";
                }
            } catch (error) {
                document.getElementById("error-msg").style.display = "block";
                document.getElementById("error-msg").textContent = "❌ Sunucuya bağlanılamadı!";
            }
        }
    </script>
</body>
</html>
