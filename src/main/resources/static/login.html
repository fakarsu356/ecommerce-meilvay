<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap - Trendyoliki</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .login-box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        .login-box h2 { text-align: center; color: #FF6000; margin-bottom: 30px; font-size: 28px; }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 6px; color: #555; font-weight: bold; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 15px; outline: none; }
        .form-group input:focus { border-color: #FF6000; }
        
        button { width: 100%; padding: 14px; background: #FF6000; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; }
        button:hover { background: #e55500; }
        
        .error { color: red; text-align: center; margin-top: 15px; display: none; }
        .back { text-align: center; margin-top: 20px; }
        .back a { color: #FF6000; text-decoration: none; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>🛍️ Trendyoliki</h2>
        
        <div class="form-group">
            <label>Kullanıcı Adı</label>
            <input type="text" id="username" placeholder="Kullanıcı adınız">
        </div>
        
        <div class="form-group">
            <label>Şifre</label>
            <input type="password" id="password" placeholder="Şifreniz">
        </div>
        
        <button onclick="login()">Giriş Yap</button>
        
        <p class="error" id="error-msg">Kullanıcı adı veya şifre hatalı!</p>
        
        <div class="back">
            <a href="index.html">← Ana sayfaya dön</a>
        </div>
    </div>

    <script>
        async function login() {
            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;

            if (!username || !password) {
                document.getElementById("error-msg").style.display = "block";
                document.getElementById("error-msg").textContent = "Lütfen tüm alanları doldurun!";
                return;
            }

            const credentials = btoa(`${username}:${password}`);

            try {
                const response = await fetch("http://localhost:8080/api/products", {
                    headers: {
                        "Authorization": `Basic ${credentials}`
                    }
                });

                if (response.ok) {
                    localStorage.setItem("auth", credentials);
                    localStorage.setItem("username", username);
                    window.location.href = "index.html";
                } else {
                    document.getElementById("error-msg").style.display = "block";
                    document.getElementById("error-msg").textContent = "Kullanıcı adı veya şifre hatalı!";
                }
            } catch (error) {
                document.getElementById("error-msg").style.display = "block";
                document.getElementById("error-msg").textContent = "Sunucuya bağlanılamadı!";
            }
        }

        document.addEventListener("keypress", (e) => {
            if (e.key === "Enter") login();
        });
    </script>
</body>
</html>
